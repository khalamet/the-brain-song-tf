        body {

            min-height: 100vh;
            background-color: #0a0a1a;
            display: flex;
            align-items: center;

        .bg-desktop {

        .overlay {

            left: 0;

            z-index: 1;
        }

        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-top: 3px solid #4fc3f7;
            padding: 22px 30px;
            z-index: 9999;
            box-shadow: 0 -8px 40px rgba(79, 195, 247, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cookie-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .cookie-left {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            flex: 1;
            min-width: 260px;
        }

        .cookie-icon {
            font-size: 32px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .cookie-text h3 {
            color: #4fc3f7;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .cookie-text p {
            color: #cdd9e5;
            font-size: 13px;
            line-height: 1.6;
        }

        .cookie-text p a {
            color: #4fc3f7;
            text-decoration: underline;
            cursor: pointer;
        }

        .cookie-text p a:hover {
            color: #81d4fa;
        }

        .cookie-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

            color: #fff;
            border: none;
            padding: 13px 32px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(79, 195, 247, 0.5);
            white-space: nowrap;
        }

        .btn-accept:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(79, 195, 247, 0.7);
            background: linear-gradient(135deg, #81d4fa, #039be5);
        }

        .btn-close {
            background: transparent;
            border: 1px solid rgba(205, 217, 229, 0.3);
            color: #8899aa;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .btn-close:hover {
            background: rgba(205, 217, 229, 0.1);
            color: #cdd9e5;
            border-color: rgba(205, 217, 229, 0.5);
        }

            .cookie-banner {
                padding: 18px 18px 24px;
            }

            .cookie-inner {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;

                width: 100%;
                justify-content: space-between;
            }

                text-align: center;
